<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Página no encontrada del estudio creativo de Axel Chaparro."
  >

  <title>Error 404 | Axel Chaparro</title>

  <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>
  <main class="error-page">
    <p class="section-label">Archivo perdido</p>

    <div class="error-illustration">
      <img
        data-error-image
        src="/assets/images/404/gibberish-libro.png"
        alt="Ilustración de error 404"
      >
    </div>

    <h1 data-error-title>
      Error 404
    </h1>

    <p class="error-message" data-error-message>
      Un Gibberish se comió el documento.
    </p>

    <p class="error-supporting-text">
      El enlace puede estar roto, la obra pudo haberse movido
      o alguna criatura de biblioteca decidió intervenir.
    </p>

    <div class="error-links">
      <a class="text-link" href="/">
        Volver al estudio
      </a>

      <a class="secondary-link" href="/cuaderno/">
        Abrir el cuaderno de trabajo
      </a>
    </div>
  </main>

  <script src="/assets/js/404.js"></script>
</body>
</html>
